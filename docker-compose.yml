services:
  db:
    image: postgres:16-alpine
    command: postgres -c max_connections=200
    environment:
      POSTGRES_DB: synapse
      POSTGRES_USER: synapse
      POSTGRES_PASSWORD: synapse
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U synapse -d synapse"]
      interval: 5s
      timeout: 5s
      retries: 5

  pgbouncer:
    image: edoburu/pgbouncer:v1.25.1-p0
    volumes:
      - ./docker/pgbouncer.ini:/etc/pgbouncer/pgbouncer.ini
      - ./docker/userlist.txt:/etc/pgbouncer/userlist.txt
    ports:
      - "6432:6432"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -p 6432 -U synapse_app"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: moneymanager-api
    ports:
      - "8000:8000"
    volumes:
      - ./synapse:/app/synapse
    environment:
      DEBUG: "true"
      POSTGRES_DB: synapse
      POSTGRES_USER: synapse_app
      POSTGRES_PASSWORD: synapse
      POSTGRES_HOST: pgbouncer
      POSTGRES_PORT: 6432
      POSTGRES_SUPERUSER: synapse
      POSTGRES_SUPERUSER_PASSWORD: synapse
    depends_on:
      pgbouncer:
        condition: service_healthy

volumes:
  postgres_data:
